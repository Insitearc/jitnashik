<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JIT Engineering Sorting Test | JIT Nashik</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --jit-red:#8B1A1A;--jit-red2:#A52020;--jit-red3:#6B1010;
  --gold:#C8922A;--gold-light:#e8b04a;--gold-pale:#f5e6c8;--gold-faint:rgba(200,146,42,.08);
  --bg:#ffffff;--bg2:#faf8f6;--bg3:#f4f0ec;--bg4:#fff9f5;
  --border:#e8ddd6;--border2:rgba(139,26,26,0.12);
  --text:#18080a;--text2:#5c3c3c;--text3:#9a8080;
  --red-soft:rgba(139,26,26,0.07);--red-border:rgba(139,26,26,0.18);
  --shadow-red:0 8px 40px rgba(139,26,26,.12);
  --shadow-sm:0 2px 12px rgba(0,0,0,.06);
}
html,body{background:var(--bg);font-family:'Poppins',sans-serif;min-height:100vh;color:var(--text)}

/* ══ HEADER ══ */
.jit-header{
  background:#fff;border-bottom:3px solid var(--jit-red);
  padding:0 16px;display:flex;align-items:center;gap:12px;height:72px;
  box-shadow:0 2px 16px rgba(139,26,26,.1);position:sticky;top:0;z-index:100
}
.jit-logo-img{
  height:56px;width:auto;max-width:380px;
  object-fit:contain;object-position:left center;
  flex-shrink:0;
}
.jit-header-divider{width:1px;height:38px;background:var(--border);flex-shrink:0;margin:0 4px}
.jit-htext{flex:1;min-width:0}
.jit-htext h2{font-size:.67rem;font-weight:600;color:var(--jit-red);line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.jit-htext p{font-size:.56rem;color:var(--text3);margin-top:1px;font-weight:400}
.jit-badge{margin-left:auto;background:var(--jit-red);color:#fff;border-radius:4px;padding:3px 11px;font-size:.58rem;font-weight:700;letter-spacing:1px;white-space:nowrap;flex-shrink:0}
.admin-link{color:var(--jit-red);font-size:.6rem;font-weight:600;text-decoration:none;padding:4px 10px;border:1px solid var(--red-border);border-radius:4px;margin-left:8px;white-space:nowrap;flex-shrink:0}
.admin-link:hover{background:var(--red-soft)}
@media(max-width:600px){
  .jit-htext{display:none}
  .jit-logo-img{height:44px;max-width:220px}
  .jit-badge{font-size:.52rem;padding:3px 8px}
}

/* ══ ANIMATIONS ══ */
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes hatBob{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-13px) rotate(2deg)}}
@keyframes spinRing{to{transform:rotate(360deg)}}
@keyframes flicker{0%,100%{opacity:1}42%{opacity:.55}50%{opacity:.9}57%{opacity:.45}65%{opacity:1}}
@keyframes candleFlame{0%,100%{transform:scaleX(1) scaleY(1)}33%{transform:scaleX(.88) scaleY(1.12) translateX(-1px)}66%{transform:scaleX(1.12) scaleY(.92) translateX(1px)}}
@keyframes glowPulseLight{0%,100%{opacity:1}50%{opacity:.7}}
@keyframes barFill{from{width:0}to{width:var(--w)}}
@keyframes tickIn{from{opacity:0;transform:scale(0) rotate(-90deg)}to{opacity:1;transform:scale(1) rotate(0deg)}}
@keyframes fadeSlideLeft{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes hatSpeak{0%{transform:rotate(-4deg) scaleY(1)}25%{transform:rotate(4deg) scaleY(1.06)}50%{transform:rotate(-2deg) scaleY(.97)}75%{transform:rotate(3deg) scaleY(1.04)}100%{transform:rotate(0deg) scaleY(1)}}
@keyframes shimmerRedGold{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes emojiPop{0%{transform:scale(0.5);opacity:0}65%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes starDrift{0%,100%{transform:translateY(0) scale(1);opacity:.6}50%{transform:translateY(-8px) scale(1.1);opacity:1}}
@keyframes rotateSlow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes rotateSlowRev{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
@keyframes pulseRing{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(1.06);opacity:.7}}
@keyframes scanLine{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
@keyframes glitchSlide{0%,100%{clip-path:inset(0 0 95% 0)}20%{clip-path:inset(20% 0 60% 0)}40%{clip-path:inset(50% 0 30% 0)}60%{clip-path:inset(70% 0 10% 0)}80%{clip-path:inset(10% 0 80% 0)}}
@keyframes hexFloat{0%,100%{transform:translateY(0) rotate(0deg);opacity:.06}50%{transform:translateY(-15px) rotate(5deg);opacity:.12}}
@keyframes particleDrift{0%{transform:translateY(0) translateX(0) scale(1);opacity:.5}33%{transform:translateY(-30px) translateX(15px) scale(1.2);opacity:.8}66%{transform:translateY(10px) translateX(-10px) scale(.8);opacity:.4}100%{transform:translateY(0) translateX(0) scale(1);opacity:.5}}
@keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes revealUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes borderDraw{from{stroke-dashoffset:1000}to{stroke-dashoffset:0}}

/* ══ COMMON ══ */
.screen{animation:fadeUp .42s cubic-bezier(.25,.46,.45,.94) both}

/* ══ REGISTER ══ */
.login-wrap{max-width:480px;margin:0 auto;padding:3rem 1.4rem;text-align:center}
.login-hat{animation:hatBob 4s ease-in-out infinite;display:inline-block;margin-bottom:.8rem}
.login-eye{font-size:.6rem;letter-spacing:3.5px;color:var(--jit-red);font-weight:700;text-transform:uppercase;margin-bottom:.4rem}
.login-title{font-family:'Poppins',sans-serif;font-size:clamp(1.2rem,4.5vw,1.7rem);font-weight:700;color:var(--jit-red);line-height:1.3;margin-bottom:.3rem}
.login-rule{width:48px;height:3px;background:linear-gradient(90deg,var(--jit-red),var(--gold));margin:.6rem auto 1rem;border-radius:2px}
.login-sub{font-size:.82rem;color:var(--text3);margin-bottom:1.8rem;font-weight:400}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.8rem 1.6rem;text-align:left}
.form-group{margin-bottom:1.1rem}
.form-label{display:block;font-size:.72rem;font-weight:600;color:var(--text2);margin-bottom:.4rem;letter-spacing:.3px}
.form-label span{color:var(--jit-red)}
.form-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:'Poppins',sans-serif;font-size:.84rem;color:var(--text);background:#fff;transition:border-color .2s,box-shadow .2s;outline:none}
.form-input:focus{border-color:var(--jit-red);box-shadow:0 0 0 3px rgba(139,26,26,.08)}
.form-input::placeholder{color:var(--text3)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:420px){.form-row{grid-template-columns:1fr}}
.form-error{font-size:.7rem;color:var(--jit-red);margin-top:.3rem;display:none}
.form-error.show{display:block}
.submit-btn{width:100%;background:var(--jit-red);color:#fff;border:none;border-radius:9px;padding:13px 24px;font-family:'Poppins',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:all .22s;box-shadow:0 4px 18px rgba(139,26,26,.3);margin-top:.5rem}
.submit-btn:hover{background:var(--jit-red2);transform:translateY(-2px);box-shadow:0 6px 22px rgba(139,26,26,.4)}
.submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.privacy-note{font-size:.65rem;color:var(--text3);text-align:center;margin-top:.9rem;line-height:1.6}

/* ══ QUIZ ══ */
.quiz-wrap{max-width:610px;margin:0 auto;padding:1.8rem 1.4rem 3rem}
.intro-wrap{max-width:570px;margin:0 auto;padding:2.5rem 1.4rem 3rem;text-align:center}
.phase-pill{display:inline-flex;align-items:center;gap:6px;background:var(--red-soft);border:1px solid var(--red-border);border-radius:30px;padding:5px 16px;font-size:.62rem;color:var(--jit-red);font-weight:700;letter-spacing:1.2px;margin-bottom:1.1rem;text-transform:uppercase}
.progress-wrap{margin-bottom:1.2rem}
.prog-top{display:flex;justify-content:space-between;margin-bottom:6px}
.prog-lbl{font-size:.64rem;color:var(--text3);font-weight:500}
.prog-num{font-size:.64rem;color:var(--jit-red);font-weight:700}
.prog-bar{background:var(--bg3);border-radius:8px;height:6px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--jit-red),var(--gold));border-radius:8px;transition:width .55s ease}
.q-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:1.5rem 1.7rem;margin-bottom:1.1rem;box-shadow:var(--shadow-sm)}
.q-num{font-size:.58rem;color:var(--jit-red);font-weight:700;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:.55rem}
.q-text{font-size:clamp(.92rem,3vw,1.08rem);color:var(--text);line-height:1.75;font-weight:500}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.3rem}
@media(max-width:450px){.opts{grid-template-columns:1fr}}
.opt{background:#fff;border:1.5px solid var(--border);border-radius:11px;padding:13px;color:var(--text);cursor:pointer;text-align:left;font-family:'Poppins',sans-serif;font-size:.79rem;line-height:1.5;transition:all .22s;display:flex;flex-direction:column;gap:4px;position:relative;overflow:hidden}
.opt::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(139,26,26,.06),transparent);opacity:0;transition:opacity .2s}
.opt:hover{border-color:var(--jit-red);background:var(--red-soft);transform:translateY(-2px);box-shadow:0 5px 16px rgba(139,26,26,.12)}
.opt:hover::before,.opt.sel::before{opacity:1}
.opt.sel{border-color:var(--jit-red);background:var(--red-soft);box-shadow:0 0 0 2px rgba(139,26,26,.14)}
.opt-icon{font-size:1.3rem}
.opt-lbl{font-size:.57rem;font-weight:700;letter-spacing:1.8px;color:var(--jit-red);text-transform:uppercase}
.nxt-btn{width:100%;background:var(--jit-red);color:#fff;border:none;border-radius:9px;padding:13px 24px;font-family:'Poppins',sans-serif;font-size:.84rem;font-weight:700;cursor:pointer;letter-spacing:.8px;transition:all .22s;opacity:0;pointer-events:none;box-shadow:0 4px 18px rgba(139,26,26,.32)}
.nxt-btn.show{opacity:1;pointer-events:auto}
.nxt-btn:hover{background:var(--jit-red2);transform:translateY(-2px)}
.student-bar{background:var(--red-soft);border:1px solid var(--red-border);border-radius:8px;padding:.55rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:8px;font-size:.7rem;color:var(--text2);font-weight:500}
.student-bar strong{color:var(--jit-red)}
.hat-anim{animation:hatBob 4s ease-in-out infinite;display:inline-block;margin-bottom:.9rem}
.intro-eye{font-size:.6rem;letter-spacing:3.5px;color:var(--jit-red);font-weight:700;text-transform:uppercase;margin-bottom:.55rem}
.intro-title{font-size:clamp(1.3rem,5vw,2rem);font-weight:700;color:var(--jit-red);line-height:1.3;margin-bottom:.4rem}
.intro-rule{width:52px;height:3px;background:linear-gradient(90deg,var(--jit-red),var(--gold));margin:.75rem auto;border-radius:2px}
.intro-sub{font-size:.86rem;color:var(--text3);margin-bottom:1.5rem}
.intro-card{background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:1.3rem 1.6rem;margin-bottom:1.5rem;text-align:left}
.intro-card p{color:var(--text2);font-size:.84rem;line-height:1.9}
.intro-card p strong{color:var(--jit-red);font-weight:600}
.begin-btn{background:var(--jit-red);color:#fff;border:none;border-radius:9px;padding:14px 48px;font-family:'Poppins',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;letter-spacing:.8px;transition:all .22s;box-shadow:0 5px 20px rgba(139,26,26,.35)}
.begin-btn:hover{background:var(--jit-red2);transform:translateY(-2px)}
.branch-chips{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;margin-top:1.8rem}
.chip{background:var(--bg2);border:1px solid var(--border);border-radius:22px;padding:5px 13px;font-size:.68rem;color:var(--text2);display:flex;align-items:center;gap:5px;font-weight:500}

/* ══ SORTING SCREEN ══ */
.sort-screen{min-height:calc(100vh - 72px);display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(170deg,#0c0603 0%,#180a04 45%,#080302 100%);position:relative;overflow:hidden;padding:2rem}
.candle{position:absolute;bottom:0;display:flex;flex-direction:column;align-items:center}
.candle-flame{width:9px;height:15px;background:radial-gradient(ellipse at 50% 85%,#fff 0%,#ffe066 25%,#f5a623 55%,rgba(245,100,20,.3) 80%,transparent 100%);border-radius:50% 50% 30% 30%;animation:candleFlame 1.4s ease-in-out infinite;transform-origin:bottom center;filter:blur(.3px)}
.candle-wax{width:9px;background:linear-gradient(180deg,#f5e6c8 0%,#e8d0a0 100%);border-radius:2px 2px 0 0}
.sort-title{font-weight:700;color:var(--gold-light);font-size:clamp(1rem,4vw,1.45rem);text-align:center;animation:glowPulseLight 2.5s infinite;margin:.5rem 0 .2rem;position:relative;z-index:2}
.sort-sub{color:rgba(245,230,200,.4);font-size:.8rem;text-align:center;position:relative;z-index:2;font-weight:300}
.sort-spin{width:50px;height:50px;border-radius:50%;border:2px solid rgba(200,146,42,.15);border-top-color:var(--gold);animation:spinRing 1s linear infinite;margin:.8rem auto;position:relative;z-index:2}
.sort-msg{color:var(--gold-pale);font-size:.84rem;text-align:center;animation:flicker 3s ease-in-out infinite;position:relative;z-index:2;margin-top:.3rem}

/* ══════════════════════════════════════════════════════
   RESULT PAGE — PREMIUM LIGHT TECHNICAL THEME
══════════════════════════════════════════════════════ */

/* Main background — layered gradient with mesh */
.result-outer{
  min-height:calc(100vh - 72px);
  background:
    linear-gradient(135deg, #fff8f5 0%, #fffcfa 25%, #faf5f0 50%, #fff9f6 75%, #fdf8f3 100%);
  background-size:400% 400%;
  animation:gradientShift 12s ease infinite;
  position:relative;overflow:hidden;
}

/* Geometric grid overlay */
.result-outer::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(139,26,26,.028) 1px, transparent 1px),
    linear-gradient(90deg, rgba(139,26,26,.028) 1px, transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
}

/* Decorative radial glows */
.result-outer::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 50% 40% at 10% 15%, rgba(139,26,26,.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 90% 80%, rgba(200,146,42,.08) 0%, transparent 60%),
    radial-gradient(ellipse 30% 25% at 80% 10%, rgba(139,26,26,.04) 0%, transparent 50%);
}

/* Floating hex decorations */
.r-hex-bg{
  position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0;
}
.r-hex{
  position:absolute;
  opacity:.055;
}
.r-hex svg{fill:none;stroke:var(--jit-red);}

/* Scan line effect */
.r-scanline{
  position:absolute;inset:0;pointer-events:none;z-index:1;overflow:hidden;
}
.r-scanline::after{
  content:'';position:absolute;width:100%;height:2px;
  background:linear-gradient(90deg,transparent,rgba(200,146,42,.12),transparent);
  animation:scanLine 8s linear infinite;
  top:0;left:0;
}

.result-scroll{
  position:relative;z-index:2;
  max-width:680px;margin:0 auto;
  padding:2.8rem 1.4rem 4rem;
}

/* ── Proclamation ── */
.r-proclamation{
  text-align:center;margin-bottom:2rem;
  animation:revealUp .6s ease both;
}
.r-proc-eyebrow{
  display:inline-flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,rgba(139,26,26,.08),rgba(200,146,42,.06));
  border:1px solid rgba(139,26,26,.2);
  border-radius:30px;padding:6px 20px;
  font-size:.58rem;color:var(--jit-red);font-weight:700;
  letter-spacing:3px;text-transform:uppercase;margin-bottom:1rem;
  box-shadow:0 2px 12px rgba(139,26,26,.08);
}
.r-proc-eyebrow::before,.r-proc-eyebrow::after{
  content:'◆';font-size:.4rem;color:var(--gold);opacity:.7;
}
.r-proc-title{
  font-family:'Playfair Display',serif;font-weight:900;
  font-size:clamp(1.6rem,5vw,2.4rem);
  background:linear-gradient(135deg,var(--jit-red) 0%,#9B2020 30%,var(--gold) 60%,#C8922A 100%);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmerRedGold 6s linear infinite;
  line-height:1.2;margin-bottom:.4rem;
}
.r-proc-sub{
  font-size:.8rem;color:var(--text3);font-weight:300;letter-spacing:.5px;
}
.r-proc-ornament{
  display:flex;align-items:center;gap:12px;justify-content:center;margin-top:1rem;
}
.r-proc-line{flex:1;max-width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--gold));opacity:.5}
.r-proc-diamond{width:8px;height:8px;background:var(--gold);transform:rotate(45deg);opacity:.6}

/* ── Hero card — premium glass-morphism light ── */
.r-hero-card{
  background:linear-gradient(145deg,#ffffff 0%,#fffbf8 50%,#fff8f3 100%);
  border:1px solid rgba(200,146,42,.25);
  border-top:none;
  border-radius:20px;
  padding:0;
  margin-bottom:1.4rem;
  position:relative;
  overflow:hidden;
  box-shadow:
    0 1px 0 0 var(--gold) inset,
    0 4px 0 0 var(--jit-red),
    0 20px 60px rgba(139,26,26,.12),
    0 4px 20px rgba(0,0,0,.06);
  animation:revealUp .7s .1s ease both;
}

/* Animated top accent bar */
.r-hero-top-bar{
  height:4px;
  background:linear-gradient(90deg,var(--jit-red),var(--gold),var(--jit-red));
  background-size:200% auto;
  animation:shimmerRedGold 3s linear infinite;
}

/* Circuit pattern overlay on hero card */
.r-hero-circuit{
  position:absolute;top:0;right:0;width:180px;height:180px;opacity:.04;pointer-events:none;
}

.r-hero-inner{padding:2.2rem 2rem 1.8rem;text-align:center;position:relative}

/* Corner ornaments */
.r-corner{position:absolute;width:22px;height:22px;border-color:rgba(200,146,42,.6);border-style:solid}
.r-corner.tl{top:16px;left:16px;border-width:2px 0 0 2px;border-radius:3px 0 0 0}
.r-corner.tr{top:16px;right:16px;border-width:2px 2px 0 0;border-radius:0 3px 0 0}
.r-corner.bl{bottom:16px;left:16px;border-width:0 0 2px 2px;border-radius:0 0 0 3px}
.r-corner.br{bottom:16px;right:16px;border-width:0 2px 2px 0;border-radius:0 0 3px 0}

/* Emoji with spinning rings */
.r-emoji-wrap{
  position:relative;display:inline-block;
  margin-bottom:1.2rem;
  animation:floatUp 4s ease-in-out infinite;
}
.r-emoji-ring-outer{
  position:absolute;inset:-22px;border-radius:50%;
  border:1px dashed rgba(200,146,42,.3);
  animation:rotateSlow 12s linear infinite;
}
.r-emoji-ring-outer::before{
  content:'◆';position:absolute;top:-5px;left:50%;transform:translateX(-50%);
  font-size:.5rem;color:var(--gold);opacity:.7;
}
.r-emoji-ring-mid{
  position:absolute;inset:-14px;border-radius:50%;
  border:1.5px solid rgba(200,146,42,.25);
  animation:rotateSlowRev 8s linear infinite;
}
.r-emoji-ring-inner{
  position:absolute;inset:-6px;border-radius:50%;
  border:2px solid rgba(139,26,26,.15);
  animation:pulseRing 2s ease-in-out infinite;
}
.r-emoji-bg{
  width:90px;height:90px;border-radius:50%;
  background:linear-gradient(135deg,rgba(139,26,26,.06),rgba(200,146,42,.08));
  display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(200,146,42,.2);
  box-shadow:0 4px 24px rgba(139,26,26,.1),inset 0 1px 0 rgba(255,255,255,.8);
}
.r-branch-emoji{
  font-size:3.5rem;display:block;
  animation:emojiPop .7s cubic-bezier(.34,1.56,.64,1) .2s both;
  filter:drop-shadow(0 4px 12px rgba(139,26,26,.2));
}
.r-branch-name{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.3rem,4.5vw,1.9rem);font-weight:900;
  background:linear-gradient(135deg,var(--jit-red) 0%,#8B1A1A 25%,var(--gold) 55%,#A0701A 80%,var(--jit-red) 100%);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmerRedGold 5s linear infinite;
  line-height:1.2;margin-bottom:.7rem;
}
.r-branch-tagline{

let toastTimer=null;
function showToast(msg,type='info',dur=3500){
  const t=document.getElementById('syncToast');
  t.textContent=msg;t.className='sync-toast show '+type;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.className='sync-toast',dur);
}

async function pushToSheets(record){
  try{
    showToast('⏳ Saving to Google Sheets…','info',8000);
    const body=new URLSearchParams({timestamp:record.timestamp,name:record.name,email:record.email,phone:record.phone,city:record.city,branch:record.branch,branchCode:record.branchCode});
    await fetch(SHEETS_URL,{method:'POST',mode:'no-cors',body});
    showToast('✅ Saved to Google Sheets!','ok',4000);return true;
  }catch(err){showToast('⚠️ Offline — saved locally','err',5000);return false;}
}
async function fetchFromSheets(){
  try{
    const res=await fetch(SHEETS_URL+'?action=getAll',{mode:'cors'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const rows=await res.json();
    if(!Array.isArray(rows)||rows.length<2) return [];
    const headers=rows[0];
    return rows.slice(1).map(r=>{const obj={};headers.forEach((h,i)=>obj[h]=r[i]||'');return{timestamp:obj['Timestamp']||'',name:obj['Name']||'',email:obj['Email']||'',phone:obj['Phone']||'',city:obj['City']||'',branch:obj['Branch Assigned']||'',branchCode:obj['Branch Code']||'',source:'cloud'};});
  }catch(e){return null;}
}
function loadLocal(){try{return JSON.parse(localStorage.getItem(LOCAL_KEY)||'[]');}catch(e){return[];}}
function saveLocal(rec){const d=loadLocal();d.push(rec);localStorage.setItem(LOCAL_KEY,JSON.stringify(d));}

function submitRegister(){
  const name=document.getElementById('f_name').value.trim();
  const email=document.getElementById('f_email').value.trim();
  const phone=document.getElementById('f_phone').value.trim();
  const city=document.getElementById('f_city').value.trim();
  let ok=true;
  const show=(id,v)=>document.getElementById(id).classList.toggle('show',v);
  show('e_name',!name);if(!name) ok=false;
  const emailOk=email&&/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  show('e_email',!emailOk);if(!emailOk) ok=false;
  const phoneOk=phone&&/^\d{10}$/.test(phone.replace(/\s/g,''));
  show('e_phone',!phoneOk);if(!phoneOk) ok=false;
  show('e_city',!city);if(!city) ok=false;
  if(!ok) return;
  currentStudent={name,email,phone:phone.replace(/\s/g,''),city};
  screen='intro';render();
}

function startQuiz(){

  Object.keys(scores).forEach(k=>scores[k]=0);
  detectedBranch=null;allQ=[...P1];render();
}

function renderQuiz(root){
  const q=allQ[qIdx];
  const total=P1.length+5;
  const pct=Math.round(qIdx/total*100);
  const sel=answers[qIdx];
  const isLast=(phase===2&&qIdx===allQ.length-1);
  const atDetect=(phase===1&&qIdx===P1.length-1);
  root.innerHTML=`
  <div class="screen quiz-wrap">
    <div class="student-bar">👤 <strong>${currentStudent.name}</strong> &nbsp;·&nbsp; ${currentStudent.city} &nbsp;·&nbsp; ${currentStudent.phone}</div>
    <div class="phase-pill">${phase===1?'🔍 Phase 1 — Discover Your Domain':'🎯 Phase 2 — '+(BRANCHES[detectedBranch||'ME'].name)+' Deep Dive'}</div>
    <div class="progress-wrap">
      <div class="prog-top"><span class="prog-lbl">Question ${qIdx+1} of ${total}</span><span class="prog-num">${pct}% complete</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="q-card"><div class="q-num">Q${qIdx+1}</div><div class="q-text">${q.q}</div></div>
    <div class="opts">
      ${q.opts.map((o,i)=>`<button class="opt${sel===i?' sel':''}" onclick="pick(${i})"><span class="opt-icon">${o.icon}</span><span class="opt-lbl">Option ${o.lbl}</span><span>${o.text}</span></button>`).join('')}
    </div>
    <button class="nxt-btn${sel!==undefined?' show':''}" id="nxt" onclick="advance()">
      ${isLast?'✨ Reveal My Destiny':atDetect?'Detect My Branch →':'Next Question →'}
    </button>
  </div>`;
}

function pick(i){
  answers[qIdx]=i;
  document.querySelectorAll('.opt').forEach((b,j)=>b.classList.toggle('sel',j===i));
  const nb=document.getElementById('nxt');if(nb) nb.classList.add('show');
}

function advance(){
  if(answers[qIdx]===undefined) return;
  const q=allQ[qIdx];const chosen=q.opts[answers[qIdx]];
  Object.entries(chosen.scores).forEach(([k,v])=>{scores[k]=(scores[k]||0)+v;});
  userChoices.push({qText:q.q,icon:chosen.icon,aText:chosen.text});
  if(phase===1&&qIdx===P1.length-1){
    detectedBranch=detectBranch();allQ=[...P1,...P2[detectedBranch]];
    phase=2;qIdx++;render();return;
  }
  if(qIdx===allQ.length-1){screen='sorting';render();setTimeout(()=>{saveAndResult();},4400);return;}
  qIdx++;render();
}

async function saveAndResult(){
  const key=topBranch();
  const record={id:Date.now(),timestamp:new Date().toLocaleString('en-IN',{timeZone:'Asia/Kolkata'}),name:currentStudent.name,email:currentStudent.email,phone:currentStudent.phone,city:currentStudent.city,branch:BRANCHES[key].name,branchCode:key,detectedDomain:detectedBranch,scores:{...scores}};
  saveLocal(record);pushToSheets(record);
  screen='result';render();
}

function renderSorting(root){
  document.getElementById('app').style.background='none';
  let candles='',stars='';
  for(let i=0;i<20;i++){const x=2.5+i*5,h=30+Math.random()*80,d=(Math.random()*1.5).toFixed(2);candles+=`<div class="candle" style="left:${x}%;bottom:0;position:absolute"><div class="candle-flame" style="animation-delay:${d}s"></div><div class="candle-wax" style="height:${h}px"></div></div>`;}
  for(let i=0;i<45;i++){const s=Math.random()<.15?3:Math.random()<.4?2:1;stars+=`<div style="position:absolute;border-radius:50%;background:#fff;left:${Math.random()*100}%;top:${Math.random()*85}%;width:${s}px;height:${s}px;animation:starDrift ${(2.5+Math.random()*3).toFixed(1)}s ${(Math.random()*4).toFixed(1)}s ease-in-out infinite;opacity:.7"></div>`;}

    <div style="position:absolute;inset:0;pointer-events:none">${stars}</div>
    <div style="position:relative;z-index:2;animation:hatSpeak 1.6s ease-in-out infinite;display:inline-block;margin-bottom:.4rem">${hatSVG(165,true)}</div>

function renderResult(root){

  const total=Object.values(scores).reduce((a,c)=>a+c,0)||1;

  // Floating hex decorations

  const positions=[

    const pos=positions[i];

    hexHTML+=`<div class="r-hex" style="${posStr};animation:hexFloat ${4+i*0.7}s ${delay}s ease-in-out infinite">

    <div class="r-choice-item" style="animation-delay:${i*.07}s">
      <div class="r-choice-tick"><svg viewBox="0 0 12 12"><polyline points="1.5,6 4.5,9 10.5,2.5"/></svg></div>
      <div>

      <div class="r-dna-lbl">

        <span class="r-dna-pct${isWin?' top-match':''}">${pct}%</span>
      </div>
      <div class="r-dna-track">
        <div class="r-dna-fill" style="--w:${pct}%;width:${pct}%;background:${isWin?'linear-gradient(90deg,var(--jit-red),var(--gold))':br.color}"></div>
      </div>
    </div>`;

  const circuitSVG=`<svg class="r-hero-circuit" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="10" y="10" width="180" height="180" rx="8" stroke="var(--jit-red)" stroke-width="0.5"/>
    <line x1="10" y1="50" x2="60" y2="50" stroke="var(--jit-red)" stroke-width="0.5"/>
    <circle cx="60" cy="50" r="3" fill="var(--jit-red)"/>
    <line x1="60" y1="50" x2="60" y2="100" stroke="var(--jit-red)" stroke-width="0.5"/>
    <line x1="60" y1="100" x2="120" y2="100" stroke="var(--jit-red)" stroke-width="0.5"/>
    <circle cx="120" cy="100" r="3" fill="var(--gold)"/>
    <line x1="120" y1="100" x2="120" y2="150" stroke="var(--gold)" stroke-width="0.5"/>
    <line x1="120" y1="150" x2="190" y2="150" stroke="var(--gold)" stroke-width="0.5"/>
    <rect x="80" y="40" width="20" height="10" stroke="var(--jit-red)" stroke-width="0.5"/>
    <rect x="140" y="115" width="10" height="20" stroke="var(--gold)" stroke-width="0.5"/>
    <line x1="30" y1="10" x2="30" y2="190" stroke="var(--jit-red)" stroke-width="0.3" stroke-dasharray="4 4"/>
    <line x1="10" y1="130" x2="190" y2="130" stroke="var(--gold)" stroke-width="0.3" stroke-dasharray="4 4"/>
  </svg>`;

  root.innerHTML=`
  <div class="result-outer">
    <div class="r-hex-bg">${hexHTML}</div>
    <div class="r-scanline"></div>
    <div style="position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden">${particleHTML}</div>

    <div class="result-scroll">

      <!-- Proclamation -->
      <div class="r-proclamation">
        <div class="r-proc-eyebrow">The Hat Has Spoken</div>
        <h1 class="r-proc-title">Your Destiny Has Been Revealed</h1>
        <p class="r-proc-sub">Based on your answers, the Sorting Algorithm has determined your path</p>
        <div class="r-proc-ornament">
          <div class="r-proc-line" style="background:linear-gradient(90deg,transparent,var(--gold))"></div>
          <div class="r-proc-diamond"></div>
          <div class="r-proc-diamond" style="background:var(--jit-red)"></div>
          <div class="r-proc-diamond"></div>
          <div class="r-proc-line" style="background:linear-gradient(270deg,transparent,var(--gold))"></div>
        </div>
      </div>

      <!-- Hero card -->
      <div class="r-hero-card">
        <div class="r-hero-top-bar"></div>
        ${circuitSVG}
        <div class="r-corner tl"></div><div class="r-corner tr"></div>
        <div class="r-corner bl"></div><div class="r-corner br"></div>
        <div class="r-hero-inner">
          <div class="r-emoji-wrap">
            <div class="r-emoji-ring-outer"></div>
            <div class="r-emoji-ring-mid"></div>
            <div class="r-emoji-ring-inner"></div>
            <div class="r-emoji-bg">
              <span class="r-branch-emoji">${b.emoji}</span>
            </div>
          </div>
          <div class="r-branch-name">${b.name}</div>
          <div class="r-branch-tagline">${b.tagline}</div>
          <div class="r-trait-row">${b.traits.map(t=>`<span class="r-trait">${t}</span>`).join('')}</div>
        </div>
      </div>

      <!-- What you'll do -->
      <div class="r-card" style="animation-delay:.1s">
        <div class="r-section-title"><span class="r-stitle-icon">🎯</span>What You'll Do at JIT</div>
        ${highlightsHTML}

      <!-- DNA -->
      <div class="r-card" style="animation-delay:.2s">
        <div class="r-section-title"><span class="r-stitle-icon">🧬</span>Your Engineering DNA</div>
        ${dnaHTML}
      </div>

      <!-- Choices -->
      <div class="r-card" style="animation-delay:.3s">
        <div class="r-section-title"><span class="r-stitle-icon">📝</span>Your Answers That Led Here</div>
        ${choicesHTML}
      </div>

      <!-- Description -->
      <div class="r-card" style="animation-delay:.4s">
        <div class="r-section-title"><span class="r-stitle-icon">💡</span>Why ${b.name}?</div>

      </div>

      <!-- CTA -->
      <div class="r-cta">
        <div class="r-cta-inner">

          <div class="r-ct-addr">📍 Survey No. 48, Near Gangapur Dam, Gangapur Road, Nashik 422 222</div>
          <div class="r-ct-phone">📞 +91 253 202 0527 &nbsp;|&nbsp; ✉️ jitedunashik1@gmail.com &nbsp;|&nbsp; 🌐 jitnashik.edu.in</div>
          <div class="r-ct-badges">
            <span class="r-ct-badge">ISO 21001:2018 Certified</span>
            <span class="r-ct-badge">NAAC Accredited</span>
            <span class="r-ct-badge">AICTE Approved</span>
            <span class="r-ct-badge">Savitribai Phule Pune University</span>
          </div>
        </div>
      </div>

      <!-- Buttons -->
      <div class="r-btn-row">
        <button class="r-btn-primary" onclick="retake()">✨ Retake the Test</button>
        <button class="r-btn-outline" onclick="shareResult()">Share My Result</button>
      </div>

    </div>
  </div>`;
}

function retake(){screen='register';document.getElementById('app').style.background='';currentStudent={name:'',email:'',phone:'',city:''};render();}
function shareResult(){
  const k=topBranch();const b=BRANCHES[k];
  const txt=`🎓 The JIT Sorting Hat has spoken!\n\nMy branch: ${b.emoji} ${b.name}\n"${b.tagline}"\n\nFind your engineering destiny at JIT Nashik 👉 jitnashik.edu.in\n\n#JITNashik #EngineeringSortingTest #Admissions2025`;
  if(navigator.share) navigator.share({title:'My JIT Engineering Destiny',text:txt,url:'https://jitnashik.edu.in'});
  else navigator.clipboard.writeText(txt).then(()=>alert('Result copied!')).catch(()=>prompt('Copy this:',txt));

function renderAdminLogin(root){
  root.innerHTML=`
  <div class="screen admin-login-wrap">
    <div class="admin-card">
      <div style="font-size:2rem;margin-bottom:.5rem">🎓</div>
      <div class="admin-title">Admin Panel</div>
      <div class="admin-sub">JIT Nashik — Sorting Test Data</div>
      <div class="form-group"><label class="form-label">Username</label><input class="form-input" id="a_user" type="text" placeholder="Admin username" autocomplete="username"/></div>

      <button class="submit-btn" onclick="adminLogin()" style="margin-top:.5rem">Login →</button>

function adminLogin(){
  const u=document.getElementById('a_user').value.trim();
  const p=document.getElementById('a_pass').value;
  if(u===ADMIN_USER&&p===ADMIN_PASS){adminLoggedIn=true;screen='admin';adminFilter='ALL';adminSearch='';adminData=[];render();loadAdminData();}
  else{document.getElementById('a_err').classList.add('show');}
}

async function loadAdminData(){
  showToast('⏳ Loading data from Google Sheets…','info',8000);
  const sheetData=await fetchFromSheets();
  if(sheetData!==null){adminData=sheetData;showToast(`✅ Loaded ${adminData.length} records from Google Sheets`,'ok',4000);}
  else{adminData=loadLocal().map(r=>({...r,source:'local'}));showToast('⚠️ Could not reach Sheets — showing local data','err',5000);}
  renderTo(document.getElementById('root'));
}

function renderAdmin(root){
  const data=adminData;
  const filtered=data.filter(r=>{
    const matchBranch=adminFilter==='ALL'||r.branchCode===adminFilter;
    const q=adminSearch.toLowerCase();
    const matchSearch=!q||(r.name||'').toLowerCase().includes(q)||(r.email||'').toLowerCase().includes(q)||(r.phone||'').includes(q)||(r.city||'').toLowerCase().includes(q)||(r.branch||'').toLowerCase().includes(q);
    return matchBranch&&matchSearch;
  });
  const branchCounts={};
  data.forEach(r=>{branchCounts[r.branchCode]=(branchCounts[r.branchCode]||0)+1;});
  const topBranchKey=Object.entries(branchCounts).sort((a,b)=>b[1]-a[1])[0];
  const branchFilters=['ALL',...Object.keys(BRANCHES)];
  root.innerHTML=`
  <div class="screen admin-panel">
    <div class="admin-header-row">
      <div><div class="admin-panel-title">📊 JIT Sorting Test — Admin Panel</div><div style="font-size:.68rem;color:var(--text3);margin-top:2px">${data.length} total submissions · Live from Google Sheets</div></div>
      <div class="admin-actions">
        <button class="btn-refresh" onclick="loadAdminData()">⟳ Refresh</button>
        <button class="btn-export" onclick="exportExcel()">⬇ Export Excel</button>
        <button class="btn-logout" onclick="adminLoggedIn=false;screen='adminLogin';render()">Logout</button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-box"><div class="stat-num">${data.length}</div><div class="stat-lbl">Total Students</div></div>
      <div class="stat-box"><div class="stat-num">${Object.keys(branchCounts).length}</div><div class="stat-lbl">Branches Assigned</div></div>
      <div class="stat-box"><div class="stat-num">${topBranchKey?BRANCHES[topBranchKey[0]]?.emoji+' '+topBranchKey[1]:'-'}</div><div class="stat-lbl">Top Branch</div></div>
      <div class="stat-box"><div class="stat-num">${[...new Set(data.map(r=>r.city).filter(Boolean))].length}</div><div class="stat-lbl">Cities</div></div>
    </div>
    <input class="search-bar" id="admin_search" type="text" placeholder="🔍  Search by name, email, phone, city or branch…" value="${adminSearch}" oninput="adminSearch=this.value;renderTo(document.getElementById('root'))"/>
    <div class="filter-row">${branchFilters.map(k=>`<button class="filter-btn${adminFilter===k?' active':''}" onclick="adminFilter='${k}';renderTo(document.getElementById('root'))">${k==='ALL'?'All Branches':(BRANCHES[k].emoji+' '+k)}</button>`).join('')}</div>
    ${filtered.length===0?`<div class="empty-state"><span class="empty-icon">📋</span>${data.length===0?'No submissions yet.':'No results match your search.'}</div>`:`
    <div class="table-wrap"><table>
      <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Phone</th><th>City</th><th>Branch Assigned</th><th>Date &amp; Time</th></tr></thead>
      <tbody>${filtered.map((r,i)=>`<tr><td class="serial-num">${i+1}</td><td><strong style="color:var(--text)">${r.name||'-'}</strong></td><td>${r.email||'-'}</td><td>${r.phone||'-'}</td><td>${r.city||'-'}</td><td><span class="branch-badge">${BRANCHES[r.branchCode]?.emoji||''} ${r.branch||'-'}</span></td><td style="font-size:.68rem;color:var(--text3)">${r.timestamp||'-'}</td></tr>`).join('')}</tbody>
    </table></div>
    <div style="font-size:.68rem;color:var(--text3);margin-top:.7rem;text-align:right">Showing ${filtered.length} of ${data.length} records</div>`}
  </div>`;
}

function exportExcel(){
  const data=adminData;
  if(!data.length){alert('No data to export yet.');return;}
  const wb=XLSX.utils.book_new();
  const summaryRows=[['JIT Nashik — Engineering Sorting Test Results'],['Generated on:',new Date().toLocaleString('en-IN',{timeZone:'Asia/Kolkata'})],[],['#','Name','Email','Phone','City','Branch Assigned','Branch Code','Date & Time']];
  data.forEach((r,i)=>{summaryRows.push([i+1,r.name,r.email,r.phone,r.city,r.branch,r.branchCode,r.timestamp]);});
  const ws1=XLSX.utils.aoa_to_sheet(summaryRows);
  ws1['!cols']=[{wch:5},{wch:22},{wch:28},{wch:14},{wch:16},{wch:28},{wch:8},{wch:22}];
  XLSX.utils.book_append_sheet(wb,ws1,'Student Summary');
  XLSX.writeFile(wb,`JIT_Sorting_Test_${new Date().toISOString().slice(0,10)}.xlsx`);
}

    <path d="M18 88 Q35 68 50 53 Q55 26 60 5 Q65 26 70 53 Q85 68 102 88Z" fill="url(#hg${sz})" opacity=".3"/>
    <path d="M14 88 Q60 79 106 88" stroke="#C8922A" stroke-width="3.5" fill="none"/>
    <path d="M48 53 Q60 48 72 53" stroke="#C8922A" stroke-width="2" fill="none" opacity=".85"/>
    <circle cx="60" cy="50" r="5" fill="#C8922A"/>
    <circle cx="60" cy="50" r="9" fill="rgba(200,146,42,.15)"/>
    <path d="M44 71 Q52 65 60 68 Q68 65 76 71" stroke="#C8922A" stroke-width="1.5" fill="none" opacity=".5"/>

      <stop offset="0%" stop-color="#C8922A"/><stop offset="100%" stop-color="${fill}"/>
    </linearGradient></defs>
  </svg>`;
}

render();
