<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIT Nashik - Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Manrope', sans-serif; }</style>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-xl w-full max-w-md border border-gray-200">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-red-900">JIT Admin Panel</h1>
            <p class="text-gray-500 mt-2 text-sm">Sign in to edit your website pages.</p>
        </div>

        <div id="error-msg" class="hidden bg-red-50 text-red-700 p-3 rounded mb-4 text-sm border border-red-200"></div>

        <form id="login-form">
            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
                <input type="text" id="username" class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-red-900 focus:outline-none" required autofocus>
            </div>
            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <input type="password" id="password" class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-red-900 focus:outline-none" required>
            </div>
            <button type="submit" class="w-full bg-red-900 hover:bg-red-800 text-white font-bold py-3 rounded transition-colors shadow-md">
                Sign In
            </button>
        </form>
    </div>

    <script>
        // If already logged in, redirect to dashboard
        if (localStorage.getItem('jit_token')) {
            window.location.href = '/dashboard.html';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.token) {
                    localStorage.setItem('jit_token', data.token);
                    window.location.href = '/dashboard.html';
                } else {
                    errorMsg.textContent = data.error || 'Login failed';
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.textContent = 'Server error. Please try again later.';
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
