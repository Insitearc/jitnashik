<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIT Nashik - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>body { font-family: 'Manrope', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-800">
    <nav class="bg-red-900 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <span class="font-bold text-xl tracking-tight"><i class="fas fa-shield-alt mr-2"></i> JIT Admin Panel</span>
                </div>
                <div class="flex items-center">
                    <button onclick="logout()" class="bg-red-800 hover:bg-red-700 px-4 py-2 rounded text-sm font-semibold transition-colors shadow-inner">
                        <i class="fas fa-sign-out-alt mr-1"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="flex justify-between items-end mb-8 border-b border-gray-200 pb-4">
            <div>
                <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Website Pages</h1>
                <p class="text-gray-500 mt-1">Select a page below to open the visual builder.</p>
            </div>
            <a href="http://localhost" target="_blank" class="text-red-900 font-bold hover:underline text-sm" id="live-site-link">
                <i class="fas fa-external-link-alt"></i> View Live Site
            </a>
        </div>

        <div id="file-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Files injected here via JS -->
            <div class="col-span-full text-center py-12">Loading pages...</div>
        </div>
    </main>

    <script>
        const token = localStorage.getItem('jit_token');
        if (!token) window.location.href = '/index.html';

        function logout() {
            localStorage.removeItem('jit_token');
            window.location.href = '/index.html';
        }
        
        // View Live Site — opens the website root served by this same admin server
        const liveOrigin = window.location.origin; // e.g. http://localhost:3000
        document.getElementById('live-site-link').href = liveOrigin + '/site/index.html';

        async function fetchFiles() {
            try {
                const response = await fetch('/api/files', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.status === 401 || response.status === 403) {
                    logout();
                    return;
                }
                
                const data = await response.json();
                const grid = document.getElementById('file-grid');
                
                if (data.files && data.files.length > 0) {
                    grid.innerHTML = data.files.map(file => {
                        let displayName = file === 'index.html' ? 'Home Page (index)' : file.replace('.html', '').replace(/-/g, ' ');
                        displayName = displayName.replace(/\b\w/g, l => l.toUpperCase());
                        
                        const icon = file === 'index.html' ? 'fa-home' : 'fa-file-code';
                        
                        return `
                            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 hover:shadow-md transition-shadow group">
                                <div class="flex items-start justify-between">
                                    <div class="flex items-center">
                                        <div class="w-10 h-10 rounded-lg bg-red-50 text-red-900 flex items-center justify-center mr-4">
                                            <i class="fas ${icon} text-lg"></i>
                                        </div>
                                        <div>
                                            <h3 class="font-bold text-lg text-gray-900 truncate max-w-[200px]" title="${displayName}">${displayName}</h3>
                                            <p class="text-xs text-gray-400 font-mono mt-1">${file}</p>
                                        </div>
                                    </div>
                                </div>
                                <div class="mt-6 flex gap-3">
                                    <a href="/editor.html?file=${encodeURIComponent(file)}" class="flex-1 bg-red-900 hover:bg-red-800 text-white text-center py-2 rounded font-semibold text-sm transition-colors block">
                                        <i class="fas fa-edit mr-1"></i> Edit Page
                                    </a>
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    grid.innerHTML = `
                        <div class="col-span-full text-center py-12 bg-white rounded-xl border border-gray-200 border-dashed">
                            <i class="fas fa-folder-open text-4xl text-gray-300 mb-3"></i>
                            <h3 class="text-lg font-bold text-gray-500">No HTML files found</h3>
                        </div>
                    `;
                }
            } catch (err) {
                console.error(err);
                document.getElementById('file-grid').innerHTML = '<div class="col-span-full text-center text-red-500">Failed to load files.</div>';
            }
        }

        fetchFiles();
    </script>
</body>
</html>
